name: Update BetaSuite Branding

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-branding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update app branding
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app.py')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'APP_VERSION = "BetaSuite Dashboard 2026-06-22"': 'APP_VERSION = "Biological Ecosystem Trajectory and Association Suite"',
              'page_title="BetaSuite | Beta Diversity Analysis"': 'page_title="BetaSuite | Ecosystem Trajectory Analysis"',
              '<div class="eyebrow">Analysis workspace</div>': '<div class="eyebrow">BetaSuite</div>',
              '<h1>Beta diversity.<br>Beautifully analyzed.</h1>': '<h1>Biological Ecosystem<br>Trajectory and Association Suite</h1>',
              '<h1>BetaSuite Dashboard</h1>': '<h1>Biological Ecosystem Trajectory and Association Suite</h1>',
              'Upload your distance matrix and metadata to generate publication-ready PCoA plots,\n                ANOSIM statistics, Mantel tests, and batch clinical association reports.': 'An integrated microbiome analytics workspace for beta diversity, ecological trajectory,\n                metadata association testing, and publication-ready visualization.',
              '<h3>Designed for microbiome data.</h3>': '<h3>Biological ecosystems.</h3>',
              '<p>Match distance matrices with metadata and instantly inspect sample compatibility.</p>': '<p>Match microbiome distance matrices with metadata and inspect sample compatibility instantly.</p>',
              '<h3>Publication-ready PCoA.</h3>': '<h3>Trajectory visualization.</h3>',
              '<h3>Statistics built in.</h3>': '<h3>Association testing.</h3>',
          }

          for old, new in replacements.items():
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit branding update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.py
          git commit -m "Update BetaSuite branding" || exit 0
          git push
